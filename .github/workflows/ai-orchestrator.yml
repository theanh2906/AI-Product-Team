name: 🚀 Mini AI Team Go Orchestrator

on:
  issues:
    types: [labeled, transferred]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  coordinate-ai-team:
    if: |
      (github.event.action == 'labeled' && github.event.label.name == 'ai-process') ||
      (github.event.action == 'transferred' && contains(github.event.issue.labels.*.name, 'ai-process'))
    runs-on: ubuntu-latest

    steps:
      - name: 📑 Checkout Bộ Chỉ Huy Code
        uses: actions/checkout@v4

      - name: 🐹 Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.5" # Hoặc version Go ông đang dùng
          cache: true

      - name: 🔍 Trích xuất Product Repo từ nhãn
        id: extract_repo
        run: |
          # Lấy nhãn bắt đầu bằng "repo:" từ event payload (dùng jq thuần để tránh lỗi pipefail khi không có nhãn)
          REPO_NAME=$(jq -r '.issue.labels[]?.name | select(startswith("repo:")) | sub("^repo:"; "")' "$GITHUB_EVENT_PATH" | head -n 1)
          
          # Nếu không tìm thấy label dạng "repo:", fallback về secret mặc định
          if [ -z "$REPO_NAME" ]; then
            REPO_NAME="${{ secrets.REPOSITORY_NAME }}"
          fi
          
          echo "PRODUCT_REPO=$REPO_NAME" >> $GITHUB_OUTPUT
        shell: bash

      - name: 🚀 Run Go Agent Orchestrator
        env:
          # Truyền các biến cần thiết cho Go app
          GITHUB_TOKEN: ${{ secrets.TEAM_GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          PRODUCT_REPO_NAME: ${{ steps.extract_repo.outputs.PRODUCT_REPO }}
          PROJECT_NUMBER: ${{ secrets.PROJECT_NUMBER }}
          PROJECT_OWNER: ${{ secrets.PROJECT_OWNER }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # Chạy trực tiếp file main của Go
          go run cmd/main.go
